name: PR Windows Flatrim (AE/SE)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write


env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  VCPKG_BINARY_SOURCES: 'clear;nuget,GitHub,readwrite'
  VCPKG_FEATURE_FLAGS: 'manifests'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: 'true'
      - uses: ./.github/actions/pr_base
        with:
          DESCRIPTION: 'Flatrim'
          SKYRIM_VR_FLAG: OFF
          SP_NEXUS_ARTIFACT_NAME: Skyrim Platform %SP_VERSION%
          DEPLOY_BRANCH: ""
          DIST_ARTIFACT_NAME: dist
          SERVER_DIST_ARTIFACT_NAME: server-dist
          SKYMP5_PATCHES_PAT: ${{ github.token }}
          NUGET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
