name: Prettier
on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install yarn packages
        run: yarn --cwd=./misc/prettier install
      - name: Check prettier errors
        run: |
          if yarn --cwd=./misc/prettier prettier-check; then
            echo "Prettier check passed."
          else
            echo "::warning title=Prettier::Repository contains formatting mismatches. The check is informational and does not fail CI."
          fi
