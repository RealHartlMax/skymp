
name: running_server_files

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: CMake build type
        required: false
        default: RelWithDebInfo
        type: choice
        options:
          - RelWithDebInfo
          - Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-server-files:
    name: Windows server files
    runs-on: windows-2022
    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'RelWithDebInfo' }}
      VCPKG_BINARY_SOURCES: clear;nuget,GitHub,readwrite
      VCPKG_FEATURE_FLAGS: manifests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true

      - uses: ./.github/actions/pr_base
        with:
          DESCRIPTION: running_server_files-windows
          SKYRIM_VR_FLAG: OFF
          SP_NEXUS_ARTIFACT_NAME: nope
          OFFLINE_MODE: OFF
          DEPLOY_BRANCH: ""
          DIST_ARTIFACT_NAME: running_server_files_windows_dist
          SERVER_DIST_ARTIFACT_NAME: running_server_files_windows_server_dist
          SKYMP5_PATCHES_PAT: ${{ github.token }}
          NUGET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  linux-server-files:
    name: Linux server files
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'RelWithDebInfo' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve base build image
        run: |
          cat ${{ github.workspace }}/misc/github_env_linux >> "$GITHUB_ENV"

      - name: Prepare workspace owner
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" \
            "$SKYMP_VCPKG_DEPS_IMAGE" \
            chown -R skymp:skymp /src

      - name: Configure CMake
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" -w "/src" \
            -u skymp \
            -e CI=true \
            "$SKYMP_VCPKG_DEPS_IMAGE" \
              ./build.sh --configure \
                -DBUILD_UNIT_TESTS=OFF \
                -DBUILD_GAMEMODE=OFF \
                -DOFFLINE_MODE=OFF \
                -DDOWNLOAD_SKYRIM_DATA=ON \
                -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build server target
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" -w "/src" \
            -u skymp \
            -e CI=true \
            "$SKYMP_VCPKG_DEPS_IMAGE" \
              ./build.sh --build --target skymp5-server

      - name: Pack server files
        run: |
          cd "${{ github.workspace }}/build"
          tar czf running_server_files_linux_server_dist.tar.gz dist/server


      - name: Upload Linux server artifact
        uses: actions/upload-artifact@v3
        with:
          name: running_server_files_linux_server_dist
          path: ${{ github.workspace }}/build/running_server_files_linux_server_dist.tar.gz

  release-server-files:
    name: Release server files
    needs: [windows-server-files, linux-server-files]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows server artifact
        uses: actions/download-artifact@v3
        with:
          name: running_server_files_windows_server_dist
          path: ./artifacts

      - name: Download Linux server artifact
        uses: actions/download-artifact@v3
        with:
          name: running_server_files_linux_server_dist
          path: ./artifacts

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: server-release-${{ github.run_number }}
          release_name: Server Release ${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Upload Windows server artifact to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/running_server_files_windows_server_dist.zip
          asset_name: running_server_files_windows_server_dist.zip
          asset_content_type: application/zip

      - name: Upload Linux server artifact to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/running_server_files_linux_server_dist.tar.gz
          asset_name: running_server_files_linux_server_dist.tar.gz
          asset_content_type: application/gzip