
name: running_server_files

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: CMake build type
        required: false
        default: RelWithDebInfo
        type: choice
        options:
          - RelWithDebInfo
          - Release
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  determine-version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          latest_tag=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$latest_tag" ]; then
            new_version="v1.0.0"
          else
            major=$(echo "$latest_tag" | sed 's/v\([0-9]*\)\..*/\1/')
            minor=$(echo "$latest_tag" | sed 's/v[0-9]*\.\([0-9]*\)\..*/\1/')
            patch=$(echo "$latest_tag" | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\)/\1/')
            new_patch=$((patch + 1))
            new_version="v${major}.${minor}.${new_patch}"
          fi
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "Next version: $new_version"

  windows-server-files:
    name: Windows server files
    needs: determine-version
    runs-on: windows-2022
    permissions:
      contents: read
      packages: write
    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'RelWithDebInfo' }}
      VCPKG_BINARY_SOURCES: clear;nuget,GitHub,readwrite
      VCPKG_FEATURE_FLAGS: manifests
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: true

      - uses: ./.github/actions/pr_base
        with:
          DESCRIPTION: running_server_files-windows
          SKYRIM_VR_FLAG: OFF
          RUN_TESTS: false
          SP_NEXUS_ARTIFACT_NAME: nope
          OFFLINE_MODE: OFF
          DEPLOY_BRANCH: ""
          DIST_ARTIFACT_NAME: running_server_files_windows_dist
          SERVER_DIST_ARTIFACT_NAME: running_server_files_windows_server_dist
          SKYMP5_PATCHES_PAT: ${{ github.token }}
          NUGET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  linux-server-files:
    name: Linux server files
    needs: determine-version
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'RelWithDebInfo' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Resolve base build image
        run: |
          cat ${{ github.workspace }}/misc/github_env_linux >> "$GITHUB_ENV"

      - name: Prepare workspace owner
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" \
            "$SKYMP_VCPKG_DEPS_IMAGE" \
            chown -R skymp:skymp /src

      - name: Build frontend
        run: |
          cd ${{ github.workspace }}/skymp5-front
          yarn install --frozen-lockfile
          yarn build

      - name: Configure CMake
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" -w "/src" \
            -u skymp \
            -e CI=true \
            "$SKYMP_VCPKG_DEPS_IMAGE" \
              ./build.sh --configure \
                -DBUILD_UNIT_TESTS=OFF \
                -DBUILD_GAMEMODE=OFF \
                -DOFFLINE_MODE=OFF \
                -DDOWNLOAD_SKYRIM_DATA=ON \
                -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build server target
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" -w "/src" \
            -u skymp \
            -e CI=true \
            "$SKYMP_VCPKG_DEPS_IMAGE" \
              ./build.sh --build --target skymp5-server

      - name: Pack server files
        run: |
          cd "${{ github.workspace }}/build"
          tar czf running_server_files_linux_server_dist.tar.gz dist/server

      - name: Upload Linux server artifact
        uses: actions/upload-artifact@v7
        with:
          name: running_server_files_linux_server_dist
          path: ${{ github.workspace }}/build/running_server_files_linux_server_dist.tar.gz

  release-server-files:
    name: Release server files
    needs: [determine-version, windows-server-files, linux-server-files]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows server artifact
        uses: actions/download-artifact@v8
        with:
          name: running_server_files_windows_server_dist
          path: ./artifacts

      - name: Download Linux server artifact
        uses: actions/download-artifact@v8
        with:
          name: running_server_files_linux_server_dist
          path: ./artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.determine-version.outputs.version }}
          name: ${{ needs.determine-version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/running_server_files_windows_server_dist.zip
            ./artifacts/running_server_files_linux_server_dist.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
