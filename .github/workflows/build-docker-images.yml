name: Build & Push skymp-vcpkg-deps and skymp-runtime-base

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'vcpkg'
      - 'Dockerfile'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' # ensures submodules are checked out

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v1

    - name: Login to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract short SHA
      id: short_sha
      shell: bash
      run: echo "short_sha=$(git rev-parse --short $GITHUB_SHA)" >> $GITHUB_OUTPUT

    - name: Extract submodule details
      id: vcpkg_details
      shell: bash
      run: |
        cd vcpkg
        echo "vcpkg_url=$(git config --get remote.origin.url)" >> $GITHUB_OUTPUT
        echo "vcpkg_commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
        cd ..

    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-vcpkg-${{ github.run_number }}
        restore-keys: |
          ${{ runner.os }}-buildx-vcpkg-

    - name: Build and push skymp-vcpkg-deps
      uses: docker/build-push-action@v2
      with:
        context: .
        file: ./Dockerfile
        target: skymp-vcpkg-deps
        builder: ${{ steps.buildx.outputs.name }}
        push: true
        tags: skymp/skymp-vcpkg-deps:${{ steps.short_sha.outputs.short_sha }}
        build-args: |
          VCPKG_URL=${{ steps.vcpkg_details.outputs.vcpkg_url }}
          VCPKG_COMMIT=${{ steps.vcpkg_details.outputs.vcpkg_commit }}
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache

    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-runtime-${{ github.run_number }}
        restore-keys: |
          ${{ runner.os }}-buildx-runtime-

    - name: Build and push skymp-runtime-base
      uses: docker/build-push-action@v2
      with:
        context: .
        file: ./Dockerfile
        target: skymp-runtime-base
        builder: ${{ steps.buildx.outputs.name }}
        push: true
        tags: skymp/skymp-runtime-base:${{ steps.short_sha.outputs.short_sha }}
        build-args: |
          VCPKG_URL=${{ steps.vcpkg_details.outputs.vcpkg_url }}
          VCPKG_COMMIT=${{ steps.vcpkg_details.outputs.vcpkg_commit }}
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache

    - name: Replace image tags in files
      run: |
        SHORT_SHA='${{ steps.short_sha.outputs.short_sha }}'
        sed -i "s|skymp/skymp-runtime-base:[^ ]*|skymp/skymp-runtime-base:${SHORT_SHA}|g" misc/deploy/remote/branchctl.sh
        sed -i "s|skymp/skymp-vcpkg-deps:[^ ]*|skymp/skymp-vcpkg-deps:${SHORT_SHA}|g" misc/github_env_linux

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v3
      with:
        commit-message: "internal: update skymp-runtime-base and skymp-vcpkg-deps to ${{ steps.short_sha.outputs.short_sha }}"
        title: "internal: update skymp-runtime-base and skymp-vcpkg-deps to ${{ steps.short_sha.outputs.short_sha }}"
        body: Bot put here this release PR, enjoy...
        branch: "internal-update-images-${{ steps.short_sha.outputs.short_sha }}"
